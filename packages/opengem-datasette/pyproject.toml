[project]
name = "opengem-datasette"
version = "0.1.0"
description = "Export OPENGEM vintage snapshots to SQLite for Datasette publication — the public-ledger moat surface"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
    "opengem-vintage>=0.1.0,<0.2.0",
]

[project.optional-dependencies]
deploy = [
    "datasette>=1.0a17",
]

[project.scripts]
opengem-snapshot = "opengem_datasette.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_datasette"]
