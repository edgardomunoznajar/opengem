[project]
name = "opengem-panel"
version = "0.1.0"
description = "OPENGEM panel assembly — turn vintage-store observations into a model-ready quarterly panel (the curation slice: resample + yoy transforms + alignment)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
    "opengem-vintage>=0.1.0,<0.2.0",
    "pandas>=2.1,<3.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_panel"]
