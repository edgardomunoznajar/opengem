[project]
name = "opengem-types"
version = "0.1.0"
description = "Canonical typed dataclasses for the OPENGEM system: Observation, Vintage, Forecast, ScenarioSpec"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
keywords = ["macroeconomics", "forecasting", "vintage", "types"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = []  # pure-stdlib

[project.urls]
Homepage = "https://github.com/edgalvez/opengem"
Repository = "https://github.com/edgalvez/opengem"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_types"]
