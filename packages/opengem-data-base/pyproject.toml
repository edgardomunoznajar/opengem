[project]
name = "opengem-data-base"
version = "0.1.0"
description = "Adapter base class + common HTTP retry/backoff for OPENGEM data adapters"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
]

[project.optional-dependencies]
http = ["httpx>=0.27,<1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_data_base"]
