[project]
name = "opengem-l3-dfm"
version = "0.1.0"
description = "OPENGEM L3 forecast backbone — DynamicFactorMQ wrapper from statsmodels (Bok et al. NY Fed Nowcasting framework)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
    "opengem-vintage>=0.1.0,<0.2.0",
    "numpy>=1.26,<3.0",
    "pandas>=2.1,<3.0",
    "statsmodels>=0.14,<1.0",
    "scipy>=1.11,<2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_l3_dfm"]
