[project]
name = "opengem-mcp"
version = "0.1.0"
description = "OPENGEM MCP server — 10 vintage-stamped tools for LLM grounding workflows"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
    "httpx>=0.27,<1.0",
    "pydantic>=2.6,<3.0",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
opengem-mcp = "opengem_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_mcp"]
