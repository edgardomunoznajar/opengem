[project]
name = "opengem-recession-prob"
version = "0.1.0"
description = "Bauer-Mertens term-spread recession probability engine for OPENGEM Situation Subsystem"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OPENGEM Maintainers" }]
dependencies = [
    "opengem-types>=0.1.0,<0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opengem_recession_prob"]
